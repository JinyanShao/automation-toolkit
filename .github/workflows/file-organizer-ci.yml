name: File Organizer CI

on:
  push:
    paths:
      - "file-organizer/**"
      - ".github/workflows/file-organizer-ci.yml"
  pull_request:
    paths:
      - "file-organizer/**"
      - ".github/workflows/file-organizer-ci.yml"

permissions:
  contents: read

jobs:
  quality:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.14"]

    defaults:
      run:
        working-directory: file-organizer

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: file-organizer/pyproject.toml

      - name: Install development dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run Ruff
        run: python -m ruff check src tests

      - name: Run pytest
        run: python -m pytest
